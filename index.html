<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Markdown Editor Live - Real-time Preview</title>
    <link rel="manifest" href="manifest.json">
    <script>if("serviceWorker"in navigator)navigator.serviceWorker.register("sw.js")</script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2pdf.js/0.10.1/html2pdf.bundle.min.js"></script>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: 'Inter', sans-serif;
            background: #1a1a2e;
            min-height: 100vh;
            color: #fff;
        }
        header {
            background: #16213e;
            padding: 15px 20px;
            text-align: center;
            border-bottom: 1px solid #0f3460;
            position: relative;
        }
        header h1 { font-size: 1.6em; margin-bottom: 3px; }
        header p { opacity: 0.7; font-size: 0.85em; }
        .theme-toggle {
            position: absolute;
            top: 15px;
            right: 20px;
            background: none;
            border: 2px solid #e94560;
            color: #e94560;
            font-size: 1.2em;
            cursor: pointer;
            padding: 5px 10px;
            border-radius: 8px;
            transition: all 0.3s ease;
        }
        .theme-toggle:hover {
            background: #e94560;
            color: white;
        }
        /* Light theme styles */
        body.light-theme {
            background: #f5f5f5;
            color: #333;
        }
        body.light-theme header,
        body.light-theme .toolbar,
        body.light-theme footer {
            background: #fff;
            border-color: #ddd;
            color: #333;
        }
        body.light-theme .input-pane {
            background: #fff;
            border-color: #ddd;
        }
        body.light-theme textarea {
            color: #333;
        }
        body.light-theme .stats-bar {
            background: #f0f0f0;
            border-color: #ddd;
            color: #666;
        }
        body.light-theme .theme-toggle {
            border-color: #333;
            color: #333;
        }
        body.light-theme .theme-toggle:hover {
            background: #333;
            color: #fff;
        }
        .toolbar {
            background: #16213e;
            padding: 10px 20px;
            display: flex;
            gap: 8px;
            flex-wrap: wrap;
            border-bottom: 1px solid #0f3460;
            align-items: center;
        }
        .toolbar button {
            background: #0f3460;
            color: white;
            border: none;
            padding: 6px 14px;
            border-radius: 6px;
            cursor: pointer;
            font-size: 0.85em;
            transition: all 0.2s;
        }
        .toolbar button:hover { background: #e94560; transform: translateY(-1px); }
        .toolbar button.pdf-btn { background: #e94560; }
        .toolbar button.pdf-btn:hover { background: #ff6b6b; }
        .toolbar .separator {
            width: 1px;
            height: 20px;
            background: #0f3460;
            margin: 0 5px;
        }
        .toolbar label {
            display: flex;
            align-items: center;
            gap: 5px;
            font-size: 0.8em;
            cursor: pointer;
        }
        .stats-bar {
            background: #0f0f1a;
            padding: 6px 20px;
            font-size: 0.75em;
            color: #888;
            border-bottom: 1px solid #0f3460;
            display: flex;
            gap: 20px;
        }
        .stats-bar span { color: #e94560; font-weight: 600; }
        .editor-container {
            display: grid;
            grid-template-columns: 1fr 1fr;
            height: calc(100vh - 165px);
        }
        .pane {
            overflow: auto;
            padding: 20px;
        }
        .input-pane {
            background: #0f0f1a;
            border-right: 1px solid #0f3460;
        }
        .preview-pane {
            background: #fff;
            color: #333;
        }
        textarea {
            width: 100%;
            height: 100%;
            background: transparent;
            color: #fff;
            border: none;
            font-family: 'JetBrains Mono', monospace;
            font-size: 14px;
            line-height: 1.6;
            resize: none;
            outline: none;
        }
        .preview-pane h1, .preview-pane h2, .preview-pane h3 {
            margin: 20px 0 10px;
            color: #1a1a2e;
        }
        .preview-pane p { margin: 10px 0; line-height: 1.6; }
        .preview-pane code {
            background: #f4f4f4;
            padding: 2px 6px;
            border-radius: 4px;
            font-family: 'JetBrains Mono', monospace;
        }
        .preview-pane pre {
            background: #2d2d2d;
            color: #f8f8f2;
            padding: 16px;
            border-radius: 8px;
            overflow-x: auto;
        }
        .preview-pane pre code {
            background: transparent;
            padding: 0;
        }
        .preview-pane blockquote {
            border-left: 4px solid #e94560;
            padding-left: 16px;
            margin: 16px 0;
            color: #666;
        }
        .preview-pane ul, .preview-pane ol {
            margin: 16px 0;
            padding-left: 24px;
        }
        .preview-pane li { margin: 8px 0; }
        .preview-pane a { color: #e94560; }
        .preview-pane table {
            width: 100%;
            border-collapse: collapse;
            margin: 16px 0;
        }
        .preview-pane th, .preview-pane td {
            border: 1px solid #ddd;
            padding: 8px;
            text-align: left;
        }
        .preview-pane th { background: #f4f4f4; }
        footer {
            background: #16213e;
            padding: 10px;
            text-align: center;
            font-size: 0.8em;
            opacity: 0.7;
        }
        footer a { color: #e94560; }
        .save-indicator {
            position: fixed;
            bottom: 50px;
            right: 20px;
            background: #0f3460;
            color: white;
            padding: 8px 16px;
            border-radius: 6px;
            font-size: 0.8em;
            opacity: 0;
            transition: opacity 0.3s;
            pointer-events: none;
        }
        .save-indicator.visible { opacity: 1; }
        @media (max-width: 768px) {
            .editor-container { grid-template-columns: 1fr; grid-template-rows: 1fr 1fr; }
            .input-pane { border-right: none; border-bottom: 1px solid #0f3460; }
            .toolbar { justify-content: center; }
            .stats-bar { flex-wrap: wrap; gap: 10px; }
        }
        .pdf-content {
            font-family: 'Inter', sans-serif;
            line-height: 1.6;
            color: #333;
        }
        .pdf-content h1, .pdf-content h2, .pdf-content h3 {
            color: #1a1a2e;
            margin: 20px 0 10px;
        }
        .pdf-content h1 { font-size: 2em; border-bottom: 2px solid #e94560; padding-bottom: 10px; }
        .pdf-content h2 { font-size: 1.5em; border-bottom: 1px solid #ddd; padding-bottom: 5px; }
        .pdf-content h3 { font-size: 1.25em; }
        .pdf-content p { margin: 10px 0; }
        .pdf-content code {
            background: #f4f4f4;
            padding: 2px 6px;
            border-radius: 4px;
            font-family: 'JetBrains Mono', monospace;
            font-size: 0.9em;
        }
        .pdf-content pre {
            background: #2d2d2d;
            color: #f8f8f2;
            padding: 16px;
            border-radius: 8px;
            overflow-x: auto;
            margin: 16px 0;
        }
        .pdf-content pre code {
            background: transparent;
            padding: 0;
            color: #f8f8f2;
        }
        .pdf-content .keyword { color: #ff79c6; }
        .pdf-content .string { color: #f1fa8c; }
        .pdf-content .function { color: #50fa7b; }
        .pdf-content .comment { color: #6272a4; }
        .pdf-content .number { color: #bd93f9; }
        .pdf-content blockquote {
            border-left: 4px solid #e94560;
            padding-left: 16px;
            margin: 16px 0;
            color: #666;
            font-style: italic;
        }
        .pdf-content ul, .pdf-content ol {
            margin: 16px 0;
            padding-left: 24px;
        }
        .pdf-content li { margin: 8px 0; }
        .pdf-content a { color: #e94560; text-decoration: none; }
        .pdf-content table {
            width: 100%;
            border-collapse: collapse;
            margin: 16px 0;
        }
        .pdf-content th, .pdf-content td {
            border: 1px solid #ddd;
            padding: 8px;
            text-align: left;
        }
        .pdf-content th { background: #f4f4f4; font-weight: 600; }
        .pdf-content tr:nth-child(even) { background: #fafafa; }
        .pdf-metadata {
            border-bottom: 2px solid #e94560;
            padding-bottom: 20px;
            margin-bottom: 30px;
        }
        .pdf-metadata h2 {
            margin: 0 0 10px 0;
            font-size: 1.5em;
        }
        /* Animations */
        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }
        .container { animation: fadeIn 0.3s ease-out; }
        button { transition: all 0.2s ease; }
        button:hover { transform: translateY(-2px); box-shadow: 0 4px 12px rgba(233, 69, 96, 0.3); }
        .theme-toggle { transition: all 0.3s ease; }
        .pane { transition: background-color 0.3s ease; }
        .pdf-metadata p {
            margin: 5px 0;
            color: #666;
            font-size: 0.9em;
        }
        #importFile { display: none; }
    </style>
</head>
<body>
    <header>
        <h1>📝 Markdown Editor Live</h1>
        <p>Type on the left, see preview on the right • Auto-saves to browser</p>
        <button id="themeToggle" class="theme-toggle" title="Toggle theme">🌙</button>
    </header>
    
    <div class="toolbar">
        <button onclick="insertText('# Heading\n')">H1</button>
        <button onclick="insertText('## Heading\n')">H2</button>
        <button onclick="insertText('**bold**')">Bold</button>
        <button onclick="insertText('*italic*')">Italic</button>
        <button onclick="insertText('[link](url)')">Link</button>
        <button onclick="insertText('```\ncode\n```')">Code</button>
        <button onclick="insertText('- item')">List</button>
        <button onclick="insertText('> quote')">Quote</button>
        <button onclick="clearEditor()">Clear</button>
        <button onclick="loadExample()">Example</button>
        <div class="separator"></div>
        <button onclick="document.getElementById('importFile').click()">📁 Import</button>
        <button onclick="exportMarkdown()">💾 Save .md</button>
        <button onclick="exportHTML()">🌐 Save HTML</button>
        <div class="separator"></div>
        <label>
            <input type="checkbox" id="includeMetadata" checked>
            PDF Metadata
        </label>
        <button class="pdf-btn" onclick="exportToPDF()">📄 Export PDF</button>
    </div>

    <div class="stats-bar">
        <div>📝 Words: <span id="wordCount">0</span></div>
        <div>📊 Characters: <span id="charCount">0</span></div>
        <div>📄 Lines: <span id="lineCount">0</span></div>
        <div>⏱️ Read time: <span id="readTime">0 min</span></div>
    </div>
    
    <div class="editor-container">
        <div class="pane input-pane">
            <textarea id="editor" placeholder="# Start typing markdown here..."></textarea>
        </div>
        <div class="pane preview-pane" id="preview"></div>
    </div>
    
    <footer>
        Made with 💡 by <a href="https://github.com/Agent-Lumi">Lumi</a> for @shalkith • 
        <span id="lastSaved">Never saved</span>
    </footer>

    <div class="save-indicator" id="saveIndicator">💾 Saved!</div>
    <input type="file" id="importFile" accept=".md,.txt,.markdown" onchange="importFile(event)">
    
    <script>
        const editor = document.getElementById('editor');
        const preview = document.getElementById('preview');
        const STORAGE_KEY = 'markdown-editor-content';
        
        // Load saved content on startup
        function loadSavedContent() {
            const saved = localStorage.getItem(STORAGE_KEY);
            if (saved) {
                editor.value = saved;
                updatePreview();
                updateStats();
                updateLastSaved();
            }
        }
        
        function updatePreview() {
            const markdown = editor.value;
            preview.innerHTML = marked.parse(markdown || '');
        }
        
        function updateStats() {
            const text = editor.value;
            const words = text.trim() ? text.trim().split(/\s+/).length : 0;
            const chars = text.length;
            const lines = text ? text.split('\n').length : 0;
            const readTime = Math.ceil(words / 200);
            
            document.getElementById('wordCount').textContent = words.toLocaleString();
            document.getElementById('charCount').textContent = chars.toLocaleString();
            document.getElementById('lineCount').textContent = lines.toLocaleString();
            document.getElementById('readTime').textContent = readTime + (readTime === 1 ? ' min' : ' mins');
        }
        
        function saveToStorage() {
            localStorage.setItem(STORAGE_KEY, editor.value);
            localStorage.setItem(STORAGE_KEY + '-time', Date.now());
            showSaveIndicator();
            updateLastSaved();
        }
        
        function showSaveIndicator() {
            const indicator = document.getElementById('saveIndicator');
            indicator.classList.add('visible');
            setTimeout(() => indicator.classList.remove('visible'), 2000);
        }
        
        function updateLastSaved() {
            const saved = localStorage.getItem(STORAGE_KEY + '-time');
            const el = document.getElementById('lastSaved');
            if (saved) {
                const date = new Date(parseInt(saved));
                el.textContent = 'Last saved: ' + date.toLocaleTimeString();
            }
        }
        
        function insertText(text) {
            const start = editor.selectionStart;
            const end = editor.selectionEnd;
            const value = editor.value;
            editor.value = value.substring(0, start) + text + value.substring(end);
            editor.focus();
            editor.selectionStart = editor.selectionEnd = start + text.length;
            updatePreview();
            updateStats();
            saveToStorage();
        }
        
        function clearEditor() {
            if (confirm('Clear all content? This will remove unsaved changes.')) {
                editor.value = '';
                updatePreview();
                updateStats();
                saveToStorage();
            }
        }
        
        function loadExample() {
            editor.value = `# Welcome to Markdown Editor Live

This is a **live markdown editor** with real-time preview.

## Features

- ✅ Live preview as you type
- ✅ GitHub flavored markdown
- ✅ Syntax highlighting
- ✅ Tables and lists
- ✅ **Word count & statistics** 📊
- ✅ **Auto-save to browser** 💾
- ✅ **Export to PDF, Markdown, HTML** 📄
- ✅ **Import .md files** 📁

## Code Example

\`\`\`javascript
function greet(name) {
    return \`Hello, \${name}!\`;
}

console.log(greet('World'));
\`\`\`

## Table Example

| Feature | Status |
|---------|--------|
| Live Preview | ✅ |
| Auto-save | ✅ |
| Statistics | ✅ |
| PDF Export | ✅ |
| File Import | ✅ |

## Blockquote

> "The best way to predict the future is to invent it."
> — Alan Kay

---

*Happy writing!* 📝`;
            updatePreview();
            updateStats();
            saveToStorage();
        }
        
        function highlightCode(code) {
            let highlighted = code
                .replace(/&/g, '&amp;')
                .replace(/</g, '&lt;')
                .replace(/>/g, '&gt;');
            
            highlighted = highlighted.replace(/\b(function|return|if|else|for|while|const|let|var|class|import|export|async|await|try|catch|new|this)\b/g, '<span class="keyword">$1</span>');
            highlighted = highlighted.replace(/(['"\`])(.*?)(\1)/g, '<span class="string">$1$2$3</span>');
            highlighted = highlighted.replace(/\b([a-zA-Z_]\w*)(?=\()/g, '<span class="function">$1</span>');
            highlighted = highlighted.replace(/(\/\/.*$)/gm, '<span class="comment">$1</span>');
            highlighted = highlighted.replace(/(\/\*[\s\S]*?\*\/)/g, '<span class="comment">$1</span>');
            highlighted = highlighted.replace(/\b(\d+)\b/g, '<span class="number">$1</span>');
            
            return highlighted;
        }
        
        function importFile(event) {
            const file = event.target.files[0];
            if (!file) return;
            
            const reader = new FileReader();
            reader.onload = (e) => {
                editor.value = e.target.result;
                updatePreview();
                updateStats();
                saveToStorage();
            };
            reader.readAsText(file);
        }
        
        function exportMarkdown() {
            const content = editor.value;
            if (!content.trim()) {
                alert('Please enter some content first!');
                return;
            }
            const blob = new Blob([content], { type: 'text/markdown' });
            const url = URL.createObjectURL(blob);
            const a = document.createElement('a');
            a.href = url;
            a.download = 'document-' + new Date().toISOString().split('T')[0] + '.md';
            a.click();
            URL.revokeObjectURL(url);
        }
        
        function exportHTML() {
            const content = preview.innerHTML;
            if (!content.trim()) {
                alert('Please enter some content first!');
                return;
            }
            const html = `<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <title>Exported Markdown</title>
    <style>
        body { font-family: 'Inter', sans-serif; max-width: 800px; margin: 40px auto; padding: 20px; line-height: 1.6; color: #333; }
        h1, h2, h3 { color: #1a1a2e; }
        code { background: #f4f4f4; padding: 2px 6px; border-radius: 4px; font-family: monospace; }
        pre { background: #2d2d2d; color: #f8f8f2; padding: 16px; border-radius: 8px; overflow-x: auto; }
        pre code { background: transparent; padding: 0; }
        blockquote { border-left: 4px solid #e94560; padding-left: 16px; margin: 16px 0; color: #666; }
        table { width: 100%; border-collapse: collapse; margin: 16px 0; }
        th, td { border: 1px solid #ddd; padding: 8px; text-align: left; }
        th { background: #f4f4f4; }
    </style>
</head>
<body>
${content}
</body>
</html>`;
            const blob = new Blob([html], { type: 'text/html' });
            const url = URL.createObjectURL(blob);
            const a = document.createElement('a');
            a.href = url;
            a.download = 'document-' + new Date().toISOString().split('T')[0] + '.html';
            a.click();
            URL.revokeObjectURL(url);
        }
        
        function exportToPDF() {
            const includeMetadata = document.getElementById('includeMetadata').checked;
            const markdownContent = editor.value;
            
            if (!markdownContent.trim()) {
                alert('Please enter some markdown content first!');
                return;
            }
            
            const pdfContainer = document.createElement('div');
            pdfContainer.className = 'pdf-content';
            pdfContainer.style.padding = '40px';
            pdfContainer.style.maxWidth = '800px';
            pdfContainer.style.margin = '0 auto';
            pdfContainer.style.background = '#fff';
            
            if (includeMetadata) {
                const now = new Date();
                const metadataDiv = document.createElement('div');
                metadataDiv.className = 'pdf-metadata';
                metadataDiv.innerHTML = `
                    <h2>Document Export</h2>
                    <p><strong>Generated:</strong> ${now.toLocaleDateString()} at ${now.toLocaleTimeString()}</p>
                    <p><strong>Source:</strong> Markdown Editor Live</p>
                `;
                pdfContainer.appendChild(metadataDiv);
            }
            
            const contentDiv = document.createElement('div');
            contentDiv.innerHTML = marked.parse(markdownContent);
            
            const codeBlocks = contentDiv.querySelectorAll('pre code');
            codeBlocks.forEach(block => {
                block.innerHTML = highlightCode(block.textContent);
            });
            
            pdfContainer.appendChild(contentDiv);
            pdfContainer.style.position = 'absolute';
            pdfContainer.style.left = '-9999px';
            document.body.appendChild(pdfContainer);
            
            const opt = {
                margin: [15, 15],
                filename: `markdown-export-${new Date().toISOString().split('T')[0]}.pdf`,
                image: { type: 'jpeg', quality: 0.98 },
                html2canvas: { scale: 2, useCORS: true, letterRendering: true },
                jsPDF: { unit: 'mm', format: 'a4', orientation: 'portrait' }
            };
            
            html2pdf().set(opt).from(pdfContainer).save().then(() => {
                document.body.removeChild(pdfContainer);
            }).catch(err => {
                console.error('PDF export error:', err);
                alert('Error generating PDF. Please try again.');
                document.body.removeChild(pdfContainer);
            });
        }
        
        // Event listeners
        editor.addEventListener('input', () => {
            updatePreview();
            updateStats();
        });
        
        // Auto-save every 3 seconds
        let saveTimeout;
        editor.addEventListener('input', () => {
            clearTimeout(saveTimeout);
            saveTimeout = setTimeout(saveToStorage, 3000);
        });
        
        // Keyboard shortcuts
        document.addEventListener('keydown', (e) => {
            if ((e.ctrlKey || e.metaKey)) {
                switch(e.key) {
                    case 's':
                        e.preventDefault();
                        exportMarkdown();
                        break;
                    case 'o':
                        e.preventDefault();
                        document.getElementById('importFile').click();
                        break;
                }
            }
        });
        
        // Theme toggle functionality
        const themeToggle = document.getElementById('themeToggle');
        const savedTheme = localStorage.getItem('editor-theme');
        const systemDark = window.matchMedia('(prefers-color-scheme: dark)').matches;
        
        // Apply saved theme or system preference
        if (savedTheme === 'light' || (!savedTheme && !systemDark)) {
            document.body.classList.add('light-theme');
            themeToggle.textContent = '☀️';
        } else {
            themeToggle.textContent = '🌙';
        }
        
        themeToggle.addEventListener('click', () => {
            const isLight = document.body.classList.contains('light-theme');
            if (isLight) {
                document.body.classList.remove('light-theme');
                localStorage.setItem('editor-theme', 'dark');
                themeToggle.textContent = '🌙';
            } else {
                document.body.classList.add('light-theme');
                localStorage.setItem('editor-theme', 'light');
                themeToggle.textContent = '☀️';
            }
        });
        
        // Listen for system theme changes
        window.matchMedia('(prefers-color-scheme: dark)').addEventListener('change', (e) => {
            if (!localStorage.getItem('editor-theme')) {
                if (e.matches) {
                    document.body.classList.remove('light-theme');
                    themeToggle.textContent = '🌙';
                } else {
                    document.body.classList.add('light-theme');
                    themeToggle.textContent = '☀️';
                }
            }
        });
        
        // Initial load
        loadSavedContent();
    </script>
</body>
</html><script>
// Import from file
const importBtn = document.createElement('button');
importBtn.textContent = '📁 Import';
importBtn.onclick = () => {
    const input = document.createElement('input');
    input.type = 'file';
    input.onchange = (e) => {
        const file = e.target.files[0];
        const reader = new FileReader();
        reader.onload = (e) => {
            const textArea = document.querySelector('textarea');
            if (textArea) textArea.value = e.target.result;
        };
        reader.readAsText(file);
    };
    input.click();
};
document.querySelector('.container')?.appendChild(importBtn);
</script>
